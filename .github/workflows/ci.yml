name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    name: Rust checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Check formatting
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Clippy (strict)
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        working-directory: src-tauri
        run: cargo test

  audit:
    name: Security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Audit dependencies
        working-directory: src-tauri
        run: cargo audit

  # Block PRs that modify workflows without maintainer approval
  workflow-guard:
    name: Workflow change guard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for workflow changes
        run: |
          CHANGED=$(git diff --name-only origin/main...HEAD -- .github/workflows/ .github/actions/)
          if [ -n "$CHANGED" ]; then
            echo "::warning::This PR modifies CI/CD workflows. Requires maintainer review."
            echo "Changed files:"
            echo "$CHANGED"
            echo "WORKFLOWS_CHANGED=true" >> "$GITHUB_ENV"
          fi

      - name: Require maintainer for workflow changes
        if: env.WORKFLOWS_CHANGED == 'true'
        run: |
          echo "::error::Workflow changes detected. This PR requires explicit approval from @ThiagoEMatumoto."
          echo "This is a security measure to prevent CI/CD pipeline tampering."
          exit 1
